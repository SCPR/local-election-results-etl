election_date: "2026-06-02"
description: "2026 California June Primary"

sources:
  los_angeles_county:
    # Find the election ID at https://results.lavote.gov — it appears in the URL
    # when the election is live. Update this before election night.
    election_id: 5100  # placeholder — update before election night
    # corrections_url: https://docs.google.com/spreadsheets/d/{SHEET_ID}/export?format=csv&gid={GID}
  ca_secretary_of_state:
    # corrections_url: https://docs.google.com/spreadsheets/d/{SHEET_ID}/export?format=csv&gid={GID}
    # Slug list is fetched dynamically from the SOS endpoint manifest.
    # The SOS updates this file for each election cycle.
    api_endpoints_url: https://media.sos.ca.gov/media/api-endpoints.csv
    slugs:
      - governor
      - lieutenant-governor
      - secretary-of-state
      - controller
      - treasurer
      - attorney-general
      - insurance-commissioner
      - superintendent-of-public-instruction
      - us-senate
      - ballot-measures
      - board-of-equalization/district/all
      - us-rep/district/all
      - state-senate/district/all
      - state-assembly/district/all
      - courts-of-appeal/district/all

  orange_county:
    # ENR URL will be published on https://www.ocvote.gov/results/current-election-results
    # ~2 weeks before election day. Paste it here to bypass the auto-scrape,
    # or leave it out to have download.py detect it automatically.
    # enr_url: https://www.livevoterturnout.com/ENR/orangecaenr/{n}/en/{hash}_Index_{n}.html
    corrections_url: https://docs.google.com/spreadsheets/d/e/2PACX-1vSFJvlOxmjx8N-DU5W2zo8g8W1wocuLx1K67Vxnq5OdA4Hrv1Eq2XSOWJ_moLJrB-jwHI4kQ-rlsYzu/pub?gid=1743750462&single=true&output=csv
  
clients:
  kpcc:
    sources:
      - los_angeles_county
      - ca_secretary_of_state
      - orange_county
